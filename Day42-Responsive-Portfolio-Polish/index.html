<!DOCTYPE html>
<html>
<head>
  <title>Responsive Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <nav>
    <div class="logo">KT</div>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section id="home" class="hero">
    <div class="content">
      <h1>Hi, I'm KT</h1>
      <p>Web Developer | MCA Student</p>
      <button>View Projects</button>
    </div>
  </section>

  <section id="about" class="about">
    <h2>About Me</h2>
    <p>
      MCA student focused on web development, DSA, and building strong fundamentals.
    </p>
  </section>

  <section id="projects" class="projects">
    <h2>Projects</h2>
    <div class="project-grid">
      <div class="card">Project 1</div>
      <div class="card">Project 2</div>
      <div class="card">Project 3</div>
    </div>
  </section>

  <section id="contact" class="contact">
    <h2>Contact</h2>
    <form>
      <input type="text" placeholder="Your Name">
      <input type="email" placeholder="Your Email">
      <textarea placeholder="Your Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

</body>
</html>

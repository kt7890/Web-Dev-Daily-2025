<!DOCTYPE html>
<html>
<head>
  <title>Interactive Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <nav>
    <div class="logo">KT</div>
    <ul id="navLinks">
      <li><a href="#home" class="nav-link active">Home</a></li>
      <li><a href="#about" class="nav-link">About</a></li>
      <li><a href="#projects" class="nav-link">Projects</a></li>
      <li><a href="#contact" class="nav-link">Contact</a></li>
    </ul>
  </nav>

  <section id="home" class="hero">
    <div class="content">
      <h1>Hi, I'm KT</h1>
      <p>Web Developer | MCA Student</p>
      <button id="projectBtn">View Projects</button>
    </div>
  </section>

  <section id="about" class="section">
    <h2>About Me</h2>
    <p>MCA student focused on web development, DSA, and strong fundamentals.</p>
  </section>

  <section id="projects" class="section">
    <h2>Projects</h2>
    <div class="project-grid">
      <div class="card">Project 1</div>
      <div class="card">Project 2</div>
      <div class="card">Project 3</div>
    </div>
  </section>

  <section id="contact" class="section">
    <h2>Contact</h2>
    <p>Let’s connect.</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
